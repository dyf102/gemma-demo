name: GemmaDemo
options:
  bundleIdPrefix: com.slipcheck
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

targets:
  GemmaDemo:
    type: application
    platform: iOS
    sources:
      - path: GemmaDemo
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.slipcheck.GemmaDemo
        INFOPLIST_FILE: GemmaDemo/Info.plist
    dependencies:
      - framework: Frameworks/llama.xcframework
        embed: true

  GemmaDemoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GemmaDemoTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GemmaDemo
